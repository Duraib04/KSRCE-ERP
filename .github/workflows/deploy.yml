name: Deploy to Vercel

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        flutter-version: ['3.0.0']
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable
          cache: true

      # Verify Flutter Installation
      - name: Verify Flutter Installation
        run: flutter --version

      # Get dependencies
      - name: Get Flutter dependencies
        run: |
          flutter pub get
          flutter pub global activate intl_utils

      # Run code analysis
      - name: Run Flutter analyzer
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # Format check
      - name: Check code format
        run: dart format --set-exit-if-changed lib/
        continue-on-error: true

      # Run tests (if any)
      - name: Run tests
        run: flutter test --no-pub --coverage 2>/dev/null || true
        continue-on-error: true

      # Build web
      - name: Build Flutter web
        run: flutter build web --release --dart-define=FLUTTER_WEB_USE_EXPERIMENTAL_CANVAS_TEXT=true --dart-define=API_BASE_URL=$API_BASE_URL --dart-define=FLUTTER_ENV=production --dart-define=API_TIMEOUT=30000 --dart-define=ENABLE_OFFLINE_MODE=true --dart-define=ENABLE_BACKGROUND_SYNC=true --dart-define=CACHE_EXPIRY_HOURS=24
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # Setup Node.js for Vercel CLI
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      # Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Deploy to Vercel (Production)
      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --confirm
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # Deploy to Vercel (Staging)
      - name: Deploy to Vercel (Staging)
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} --confirm
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}

      # Comment PR with deployment status
      - name: Comment PR with deployment status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successful! Ready for review.'
            })
        continue-on-error: true

      # Upload build artifacts
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: flutter-web-build
          path: build/web/
          retention-days: 7

      # Upload coverage reports
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: flutter
        continue-on-error: true
